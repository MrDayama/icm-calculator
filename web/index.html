<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICM Calculator - Poker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ICM Calculator</h1>
            <div class="status-badge">Professional Edition</div>
        </header>

        <main>
            <div class="mode-switch">
                <button id="mode-icm" class="btn-tab active">ICM EV</button>
                <button id="mode-range" class="btn-tab">Range Analyzer</button>
            </div>

            <section class="card-section" id="payouts-section">
                <!-- Payouts section remains same -->
                <div class="section-header">
                    <h2><span class="icon">🏆</span> 賞金構造 (Payouts)</h2>
                    <button id="add-payout" class="btn-icon">+</button>
                </div>
                <div id="payout-list" class="input-list"></div>
            </section>

            <!-- ICM EV Mode specific -->
            <section class="card-section" id="players-section">
                <div class="section-header">
                    <h2><span class="icon">👤</span> プレイヤーとスタック</h2>
                    <button id="add-player" class="btn-icon">+</button>
                </div>
                <div id="player-list" class="input-list"></div>
            </section>

            <!-- Range Analyzer Mode specific -->
            <section class="card-section hidden" id="range-settings-section">
                <div class="section-header">
                    <h2><span class="icon">🎯</span> 分析設定 (vs All-in)</h2>
                </div>
                <div class="input-list">
                    <div class="input-row-range">
                        <label>Hero (あなた)</label>
                        <select id="hero-select" class="range-select"></select>
                    </div>
                    <div class="input-row-range">
                        <label>Villain (プッシュ側)</label>
                        <select id="villain-select" class="range-select"></select>
                    </div>
                    <div class="input-row-range">
                        <label>相手のプッシュレンジ (%)</label>
                        <input type="number" id="villain-range-pct" value="30" min="1" max="100">
                    </div>
                </div>
            </section>

            <div class="action-container">
                <button id="calc-btn" class="btn-primary">計算する (Calculate)</button>
            </div>

            <!-- Heatmap Container -->
            <section class="results-section hidden" id="heatmap-section">
                <h2>コール推奨レンジ</h2>
                <div class="heatmap-wrapper">
                    <div id="heatmap-grid" class="heatmap-grid"></div>
                </div>
                <div class="heatmap-legend">
                    <span class="legend-item"><span class="box call"></span> Call</span>
                    <span class="legend-item"><span class="box fold"></span> Fold</span>
                    <span id="req-equity-display" class="req-equity">Req. Equity: 0%</span>
                </div>
            </section>

            <section class="results-section hidden" id="results-display">
                <!-- EV Results section -->
                <h2>計算結果 (EV)</h2>
                <div id="result-list" class="result-cards">
                    <!-- Results will be injected here -->
                </div>
                <div class="total-prize-pool">
                    合計賞金: <span id="total-payout-display">0</span>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 Poker ICM Pro Tools</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
