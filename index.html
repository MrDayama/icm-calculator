<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICM Calculator - Stable v1.1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1.0">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ICM Calculator</h1>
            <div class="status-badge">v1.1.0 - Stable Edition</div>
        </header>

        <main>
            <section class="card-section">
                <h2>Payouts (%)</h2>
                <div id="payout-list" class="input-list"></div>
                <button onclick="addPayout()" class="btn-sub">+ Add Payout</button>
            </section>

            <section class="card-section">
                <h2>Stacks (BB)</h2>
                <div id="player-list" class="input-list"></div>
                <button onclick="addPlayer()" class="btn-sub">+ Add Player</button>
            </section>

            <button id="calc-btn" class="btn-primary" onclick="calculate()">RUN ICM ANALYSIS</button>

            <section id="results-display" class="card-section hidden" style="margin-top: 2rem;">
                <h2>Analysis Results</h2>
                <div id="result-list" class="result-cards"></div>
            </section>
        </main>

        <footer>
            <p>© 2026 Poker ICM Tools - Legacy Stable Edition</p>
        </footer>
    </div>
    <script src="app.js?v=1.1.0"></script>
</body>
</html>
